{% extends "base.html" %}

{% block title %}تسجيل معاملة جديدة{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <h2>تسجيل معاملة جديدة</h2>
    
    <div class="card">
        <div style="margin-bottom: 20px;">
            <label>بحث عن الطبيب</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="doctor-search" class="form-control" placeholder="ادخل اسم الطبيب أو رقم الهاتف">
                <button type="button" class="btn" onclick="searchDoctor()">بحث</button>
            </div>
            <div id="search-results" style="margin-top: 10px; border: 1px solid #ddd; display: none;"></div>
        </div>

        <form method="post" id="transaction-form" style="display: none;">
            {% csrf_token %}
            <input type="hidden" name="doctor_id" id="doctor_id">
            
            <div class="alert alert-success" id="doctor-info">
                <strong>الطبيب:</strong> <span id="doc-name"></span><br>
                <strong>الرصيد المتاح:</strong> <span id="doc-balance"></span> ج.م
            </div>

            <div style="margin-bottom: 15px;">
                <label>مبلغ المعاملة (ج.م)</label>
                <input type="number" name="amount" class="form-control" required min="1" step="0.01">
            </div>

            <div style="margin-bottom: 15px;">
                <label>وصف المشتريات (اختياري)</label>
                <textarea name="description" class="form-control" rows="3"></textarea>
            </div>

            <button type="submit" class="btn" style="width: 100%;">إتمام المعاملة</button>
        </form>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
function searchDoctor() {
    const query = document.getElementById('doctor-search').value;
    if (query.length < 2) return;

    fetch(`/api/doctor-lookup/?q=${query}`)
    .then(response => response.json())
    .then(data => {
        const resultsDiv = document.getElementById('search-results');
        resultsDiv.innerHTML = '';
        resultsDiv.style.display = 'block';
        
        if (data.results.length === 0) {
            resultsDiv.innerHTML = '<div style="padding:10px;">لا توجد نتائج</div>';
            return;
        }

        data.results.forEach(doc => {
            const div = document.createElement('div');
            div.style.padding = '10px';
            div.style.cursor = 'pointer';
            div.style.borderBottom = '1px solid #eee';
            div.onmouseover = function() { this.style.backgroundColor = '#f0f0f0'; };
            div.onmouseout = function() { this.style.backgroundColor = 'white'; };
            div.innerHTML = `<strong>${doc.name}</strong> - ${doc.phone}`;
            div.onclick = function() {
                selectDoctor(doc);
            };
            resultsDiv.appendChild(div);
        });
    });
}

function selectDoctor(doc) {
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('transaction-form').style.display = 'block';
    document.getElementById('doctor_id').value = doc.id;
    document.getElementById('doc-name').innerText = doc.name;
    document.getElementById('doc-balance').innerText = doc.balance;
}
</script>
{% endblock %}
