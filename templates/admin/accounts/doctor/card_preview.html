<div class="flex flex-col gap-8 items-center justify-center p-8 bg-gray-50 dark:bg-gray-900 rounded-xl">
    <div class="flex flex-col md:flex-row gap-12 items-start justify-center">
        <!-- FRONT -->
        <div class="flex flex-col items-center gap-2">
            <span class="text-xs font-bold uppercase text-gray-400 tracking-widest">Front Side</span>
            <div class="relative w-[400px] h-[240px] bg-[#F5ECD7] overflow-hidden shadow-xl rounded-lg text-black border border-gray-200">
                <!-- Red Circle and Logo Area -->
                <div class="absolute top-6 left-6 w-16 h-16 bg-[#A02020] rounded-full flex items-center justify-center shadow-lg">
                    <img src="/static/logo.png" alt="Logo" class="w-12 h-auto" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <span style="display:none; color:white; font-weight:bold; font-size:10px; text-align:center;">LOGO</span>
                </div>
                
                <!-- QR Code Area -->
                <div class="absolute top-6 right-6 w-24 h-24 bg-white p-1 rounded-sm shadow-md border border-gray-100">
                    <div id="qr-preview-container" class="w-full h-full">
                        <!-- We use a script to generate the full URL QR code -->
                        <img id="qr-preview-img" src="" alt="QR Code" class="w-full h-full">
                    </div>
                </div>

                <!-- Doctor Details Area -->
                <div class="absolute bottom-10 left-8 text-left">
                    <h2 class="text-2xl font-bold text-gray-900 mb-1">Dr. {{ original.name }}</h2>
                    <div class="space-y-0.5 mt-2">
                        <p class="text-[10px] uppercase tracking-wider text-gray-500 font-bold">Specialization</p>
                        <p class="text-sm text-gray-800 font-medium">{{ original.specialty.name|default:"General Medicine" }}</p>
                    </div>
                    <div class="space-y-0.5 mt-2">
                        <p class="text-[10px] uppercase tracking-wider text-gray-500 font-bold">Phone</p>
                        <p class="text-sm text-gray-800 font-medium">{{ original.phone }}</p>
                    </div>
                </div>

                <!-- Bottom Red Bar -->
                <div class="absolute bottom-0 w-full h-3 bg-[#A02020]"></div>
            </div>
        </div>

        <!-- BACK -->
        <div class="flex flex-col items-center gap-2">
            <span class="text-xs font-bold uppercase text-gray-400 tracking-widest">Back Side</span>
            <div class="relative w-[400px] h-[240px] bg-[#A02020] flex items-center justify-center shadow-xl rounded-lg overflow-hidden">
                <!-- Logo on Back -->
                <div class="w-56 drop-shadow-2xl flex flex-col items-center">
                    <img src="/static/logo.png" alt="Logo" class="w-full h-auto brightness-0 invert" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <span style="display:none; color:white; font-weight:bold; font-size:24px;">LOGO</span>
                </div>
                
                <!-- Decorative subtle pattern -->
                <div class="absolute inset-0 opacity-5 pointer-events-none bg-[radial-gradient(circle_at_center,_white_1px,_transparent_1px)] bg-[length:20px_20px]"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const qrImg = document.getElementById('qr-preview-img');
            const qrCode = "{{ original.qr_code }}";
            const protocol = window.location.protocol;
            const host = window.location.host;
            const fullUrl = protocol + "//" + host + "/scan/" + qrCode + "/";
            
            // Use an external API to generate the QR code for preview
            qrImg.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent(fullUrl);
        })();
    </script>
</div>
