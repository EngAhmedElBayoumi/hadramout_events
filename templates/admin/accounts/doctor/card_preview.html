<div class="flex flex-col md:flex-row gap-12 items-center justify-center p-12 bg-white dark:bg-gray-900 rounded-xl shadow-inner">
    <!-- FRONT -->
    <div class="relative w-[400px] h-[240px] bg-[#F5ECD7] overflow-hidden shadow-2xl rounded-lg text-black border border-gray-200">
        <!-- Red Circle and Logo Area -->
        <div class="absolute top-6 left-6 w-16 h-16 bg-[#A02020] rounded-full flex items-center justify-center shadow-lg">
            <img src="/static/logo.png" alt="Logo" class="w-12 h-auto">
        </div>
        
        <!-- QR Code Area -->
        <div class="absolute top-6 right-6 w-24 h-24 bg-white p-1 rounded-sm shadow-md border border-gray-100">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data={{ original.qr_code }}" alt="QR Code" class="w-full h-full">
        </div>

        <!-- Doctor Details Area -->
        <div class="absolute bottom-10 left-8 text-left">
            <h2 class="text-2xl font-bold text-gray-900 mb-1">Dr. {{ original.name }}</h2>
            <div class="space-y-0.5 mt-2">
                <p class="text-[11px] uppercase tracking-wider text-gray-500 font-semibold italic">Specialization</p>
                <p class="text-sm text-gray-800 font-medium">{{ original.specialty.name|default:"General Medicine" }}</p>
            </div>
            <div class="space-y-0.5 mt-2">
                <p class="text-[11px] uppercase tracking-wider text-gray-500 font-semibold italic">Phone</p>
                <p class="text-sm text-gray-800 font-medium">{{ original.phone }}</p>
            </div>
        </div>

        <!-- Bottom Red Bar -->
        <div class="absolute bottom-0 w-full h-2 bg-[#A02020]"></div>
    </div>

    <!-- BACK -->
    <div class="relative w-[400px] h-[240px] bg-[#A02020] flex items-center justify-center shadow-2xl rounded-lg overflow-hidden">
        <!-- Logo on Back -->
        <div class="w-56 drop-shadow-2xl">
            <img src="/static/logo.png" alt="Logo" class="w-full h-auto brightness-[200%] grayscale contrast-[200%]">
        </div>
        
        <!-- Decorative subtle pattern (optional, for premium feel) -->
        <div class="absolute inset-0 opacity-10 pointer-events-none bg-[radial-gradient(circle_at_center,_white_1px,_transparent_1px)] bg-[length:20px_20px]"></div>
    </div>
</div>
