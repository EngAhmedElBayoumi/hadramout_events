{% extends "admin/change_list.html" %}
{% load i18n admin_urls static admin_list %}

{% block content %}
    <div x-data="{ view: 'table' }">
        <div class="flex justify-end mb-4 gap-2">
            <button 
                @click="view = 'table'" 
                :class="view === 'table' ? 'bg-primary-600 text-white' : 'bg-white text-gray-700'"
                class="px-4 py-2 rounded-md border border-gray-300 text-sm font-medium focus:outline-none transition-colors"
            >
                {% trans "Table View" %}
            </button>
            <button 
                @click="view = 'calendar'" 
                :class="view === 'calendar' ? 'bg-primary-600 text-white' : 'bg-white text-gray-700'"
                class="px-4 py-2 rounded-md border border-gray-300 text-sm font-medium focus:outline-none transition-colors"
                @click.once="initCalendar()"
            >
                {% trans "Calendar View" %}
            </button>
        </div>

        <div x-show="view === 'table'">
            {{ block.super }}
        </div>

        <div x-show="view === 'calendar'" height="600px" class="bg-white p-4 rounded-lg shadow">
            <div id="calendar"></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
        <script>
            function initCalendar() {
                var calendarEl = document.getElementById('calendar');
                var calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    locale: '{{ LANGUAGE_CODE }}',
                    direction: 'rtl',
                    events: [
                        {% for result in results %}
                            {
                                title: "{{ result.name }}",
                                start: "{{ result.date|date:'Y-m-d' }}",
                                url: "{% url 'admin:events_event_change' result.pk %}"
                            },
                        {% endfor %}
                    ]
                });
                setTimeout(() => {
                    calendar.render();
                }, 100);
            }
        </script>
    </div>
{% endblock %}
