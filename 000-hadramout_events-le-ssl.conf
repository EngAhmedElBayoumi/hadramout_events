<VirtualHost *:443>
    ServerName hadramout.ahmedtarek.org

    ServerAdmin webmaster@localhost
    Alias /static /var/www/hadramout_events/static-root
    <Directory /var/www/hadramout_events/static-root>
        Require all granted
    </Directory>
    Alias /media /var/www/hadramout_events/media-root
    <Directory /var/www/hadramout_events/media-root>
        Require all granted
    </Directory>
    <Directory /var/www/hadramout_events/venv/src/project>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    WSGIDaemonProcess hadramout_events_ssl python-path=/var/www/hadramout_events/venv/src/:/var/www/hadramout_events/venv/lib/python3.11/site-packages
    WSGIProcessGroup hadramout_events_ssl
    WSGIScriptAlias / /var/www/hadramout_events/venv/src/project/wsgi.py

    ErrorLog ${APACHE_LOG_DIR}/hadramout_events-error.log
    CustomLog ${APACHE_LOG_DIR}/hadramout_events-access.log combined

</VirtualHost>
<IfModule mod_ssl.c>
<VirtualHost *:80>
    ServerName hadramout.ahmedtarek.org

    RewriteEngine On
# Some rewrite rules in this file were disabled on your HTTPS site,
# because they have the potential to create redirection loops.

#     RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
</IfModule>
